<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel lemon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="game-screen">
      <div id="player"></div>
      <div id="spawnpoint"></div>
      <div id="obstacles">
        <div id="rocks">
         <div class="obstacle rocks"></div>
         <div class="obstacle rocks" id="rocks2"></div>
        </div>

        <div id="houses">
          <div class="obstacle houses"></div>
          <div class="obstacle houses" id="house2"></div>

        </div>
       
        <div id="trees">
          <div class="obstacle trees"></div>
          <div class="obstacle trees" id="tree2"></div>

        </div>

      </div>
      <div id="farm-paths">
        <div class="farmpaths"></div>
      </div>

      <div id="dirt-paths">
        <div class="dirtpaths"></div>
      </div>
    </div>
    <div id="layout">
       <div id="mini-map"></div>
       <div id="health-container">
         <div id="health-bar"></div>
        </div>
    </div>
  </div>
 
  <script src="index.js"></script>
</body>
</html>
